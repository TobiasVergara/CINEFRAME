name: Generar peliculas del dia siguiente

on:
  schedule:
    - cron: '55 22 * * *'
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha a generar (YYYY-MM-DD, vacio = manana)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar peliculas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.fecha }}" ]; then
            python generate.py "${{ github.event.inputs.fecha }}"
          else
            python generate.py
          fi

      - name: Commit y push
        run: |
          git config user.name "CineFrame Bot"
          git config user.email "cineframe-bot@users.noreply.github.com"
          git add peliculas.json
          git diff --staged --quiet || git commit -m "Peliculas generadas"
          git push

