name: Generar películas del día siguiente

on:
  schedule:
    # Cada noche a las 23:55 (hora UTC, equivale a 00:55 en España en invierno, 01:55 en verano)
    # Ajusta el horario si quieres que sea exactamente a medianoche en tu zona
    - cron: '55 22 * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde la pestaña Actions de GitHub
    inputs:
      fecha:
        description: 'Fecha a generar (YYYY-MM-DD, vacío = mañana)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar películas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.fecha }}" ]; then
            python generate.py "${{ github.event.inputs.fecha }}"
          else
            python generate.py
          fi

      - name: Commit y push
        run: |
          git config user.name "CineFrame Bot"
          git config user.email "cineframe-bot@users.noreply.github.com"
          git add peliculas.json
          git diff --staged --quiet || git commit -m "🎬 Películas del $(date -d '+1 day' '+%Y-%m-%d')"
          git push
